http:
  routers:
    site-contact:
      entryPoints:
        - web
      rule: Path(`/contact`) && Method(`POST`)
      priority: 90
      service: site-app
      middlewares:
        - site-rate-limit-global
        - site-inflight-global
        - site-body-limit-contact
        - site-compress

    site-web:
      entryPoints:
        - web
      rule: PathPrefix(`/`)
      priority: 1
      service: site-app
      middlewares:
        - site-rate-limit-global
        - site-inflight-global
        - site-body-limit-web
        - site-compress

  middlewares:
    site-compress:
      compress: {}

    site-rate-limit-global:
      rateLimit:
        average: 60
        burst: 120
        period: 1m

    site-inflight-global:
      inFlightReq:
        amount: 200

    site-body-limit-web:
      buffering:
        maxRequestBodyBytes: 1048576

    site-body-limit-contact:
      buffering:
        maxRequestBodyBytes: 65536

  services:
    site-app:
      loadBalancer:
        servers:
          - url: http://app:8000
